<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ee">
  <title>Loopy Mapper</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Loopy Mapper</h1>
      <p id="statusLine">Ready</p>
    </div>
    <div class="actions">
      <button id="validateButton" type="button">Validate</button>
      <button id="exportProfileButton" type="button">Profile</button>
      <button id="exportProjectButton" type="button" class="primary">Project Zip</button>
    </div>
  </header>

  <main class="workspace">
    <section class="editorPane" aria-label="YAML mapping editor">
      <div class="paneHeader">
        <h2>YAML</h2>
        <span class="paneButtons">
          <button id="loadButton" type="button">Load</button>
          <button id="resetButton" type="button">Reset</button>
        </span>
        <input id="loadFile" type="file" accept=".yaml,.yml,.txt,text/yaml,text/plain" hidden>
      </div>
      <textarea id="yamlInput" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
    </section>

    <section class="previewPane" aria-label="Generated binding preview">
      <div class="paneHeader">
        <h2>Preview</h2>
        <span id="bindingCount">0 bindings</span>
      </div>
      <div id="messageBox" class="messageBox" role="status"></div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Label</th>
              <th>Trigger</th>
              <th>Actions</th>
              <th>Subject</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="loopy-actions.js"></script>
  <script src="app.js"></script>
</body>
</html>
