# Son of Late Night Mapping — starter mapping (the part we can generate cleanly today).
# 8 drum samples on ATM SQ pads, MIDI ch10 notes 36-43 -> tracks 0-7 (Play/Stop).
# Loop FX buttons, volume sliders, drum-loop rec/clear, and the two scene-capture
# buttons get added once we know the controller's CCs and harvest the FX/capture/record
# identifiers (see son-of-late-night.md).

project:
  name: Son of Late Night Mapping
device:
  name: ATM SQ
  display_name: ATM SQ
  type: MIDI

bindings:
  # --- Drum samples: pads 36-43 on ch10 -> drum tracks 0-7, in order ---
  - repeat: 8
    label: "Drum %subject (note %note)"
    trigger: { kind: note, channel: 10, note: 36 }   # 36 Rim .. 43 Perc2
    actions:
      - action: play/stop
        subject: 0                                    # track 0 Rim .. 7 Perc2

  # --- Examples to fill in once the controller's CCs are known ---
  # Loop volume slider (verified action; set <cc>/<channel> to your knob):
  # - label: "Guitar Loop 1 volume"
  #   trigger: { kind: cc, channel: 3, cc: 30 }
  #   actions:
  #     - action: volume        # -> Track Parameter
  #       subject: 8
  #
  # Drum-loop clear (verified) on a hold:
  # - label: "Clear Drum Loop 1"
  #   trigger: { kind: cc, channel: 3, cc: 40, hold: true }
  #   actions:
  #     - action: clear         # -> Clear Track
  #       subject: 12
  #
  # FX toggle / Record / Scene capture need their identifiers harvested first
  # (they will export as warned guesses until then).
