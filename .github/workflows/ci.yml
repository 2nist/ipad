name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend — typecheck, tests, lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loopy-mapper-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: loopy-mapper-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --force

      - name: Unit tests
        run: npx vitest run

      - name: Lint
        run: npx oxlint

      - name: Build
        run: npm run build

  backend:
    name: Backend — import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loopy-mapper-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: loopy-mapper-react/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Import FastAPI app
        run: python -c "import backend.main; print('OK:', backend.main.app.title)"
